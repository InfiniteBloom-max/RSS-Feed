<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Pulse — Live Feed Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
           RSS PULSE — Design System
        ═══════════════════════════════════════════════════ */
        :root {
            --bg:          #09090b;
            --surface:     #0f0f12;
            --surface-2:   #141418;
            --card:        #1c1c21;
            --card-h:      #232329;
            --border:      #252529;
            --border-2:    #38383f;
            --accent:      #7c6ef2;
            --accent-2:    #a89af7;
            --accent-bg:   rgba(124,110,242,.10);
            --accent-glow: rgba(124,110,242,.22);
            --text:        #f0f0f4;
            --text-2:      #8e8e9e;
            --text-3:      #505060;
            --ok:          #3dd68c;
            --err:         #f87171;
            --sidebar:     260px;
            --topbar:      58px;
            --radius:      10px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* subtle grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,110,242,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,110,242,.025) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── LAYOUT ───────────────────────────────────── */
        .app {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ── SIDEBAR ──────────────────────────────────── */
        .sidebar {
            width: var(--sidebar);
            min-width: var(--sidebar);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0; right: -1px;
            width: 1px; height: 100%;
            background: linear-gradient(180deg, transparent 0%, var(--accent) 50%, transparent 100%);
            opacity: 0.18;
        }

        .sb-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* brand */
        .sidebar-brand {
            padding: 18px 16px 16px;
            display: flex;
            align-items: center;
            gap: 11px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .brand-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            letter-spacing: -0.025em;
            line-height: 1;
        }

        .brand-text em { color: var(--accent); font-style: normal; }

        .brand-sub {
            font-family: 'Syne Mono', monospace;
            font-size: 0.56rem;
            color: var(--text-3);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* sidebar sections */
        .sb-section { padding: 14px 14px 0; }

        .sb-label {
            font-family: 'Syne Mono', monospace;
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .sb-divider {
            height: 1px;
            background: var(--border);
            margin: 14px 14px 0;
        }

        /* add feed */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .url-input-wrap { position: relative; }

        .url-input-wrap i {
            position: absolute;
            left: 10px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 11px;
            pointer-events: none;
        }

        .url-input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            color: var(--text);
            padding: 8px 10px 8px 28px;
            border-radius: 7px;
            font-size: 0.78rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .url-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        .url-input::placeholder { color: var(--text-3); }

        .btn-add {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 10px;
            border-radius: 7px;
            font-size: 0.78rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s, box-shadow 0.15s, transform 0.1s;
        }

        .btn-add:hover {
            opacity: 0.92;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-add:active { transform: scale(0.97); }

        /* presets */
        .presets {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .preset-btn {
            background: none;
            border: none;
            color: var(--text-2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            padding: 7px 8px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 9px;
            text-align: left;
            transition: background 0.1s, color 0.1s;
            width: 100%;
        }

        .preset-btn:hover { background: var(--accent-bg); color: var(--text); }

        .preset-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            opacity: 0.55;
        }

        /* feeds list */
        .feeds-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .feed-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .feed-row:hover { background: var(--card); }
        .feed-row.active { background: var(--accent-bg); }

        .feed-avatar {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 11px;
            color: #fff;
            flex-shrink: 0;
        }

        .feed-row-info { flex: 1; min-width: 0; }

        .feed-row-name {
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .feed-row-meta {
            font-family: 'Syne Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-3);
            margin-top: 2px;
        }

        .feed-remove {
            background: none;
            border: none;
            color: var(--text-3);
            cursor: pointer;
            font-size: 10px;
            padding: 3px 4px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.1s, color 0.1s, background 0.1s;
            flex-shrink: 0;
        }

        .feed-row:hover .feed-remove { opacity: 1; }
        .feed-remove:hover { color: var(--err); background: rgba(248,113,113,.1); }

        /* stats */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-num {
            font-family: 'Syne Mono', monospace;
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 0.62rem;
            color: var(--text-3);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── MAIN ─────────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            min-width: 0;
        }

        /* topbar */
        .topbar {
            height: var(--topbar);
            background: rgba(9,9,11,.8);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        .topbar-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.88rem;
            white-space: nowrap;
            color: var(--text-2);
            min-width: 80px;
        }

        .topbar-title strong { color: var(--text); }

        .topbar-search {
            flex: 1;
            max-width: 360px;
            margin: 0 auto;
            position: relative;
        }

        .topbar-search i {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 12px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            color: var(--text);
            padding: 7px 12px 7px 32px;
            border-radius: 7px;
            font-size: 0.82rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        .search-input::placeholder { color: var(--text-3); }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Syne Mono', monospace;
            font-size: 0.64rem;
            color: var(--text-3);
            padding: 4px 10px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            white-space: nowrap;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ok);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .btn-refresh {
            width: 34px;
            height: 34px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            color: var(--text-2);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .btn-refresh:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-refresh.spinning i { animation: spin 0.7s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* filter tabs */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }

        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-tab {
            background: none;
            border: none;
            color: var(--text-3);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            padding: 10px 13px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s;
            margin-bottom: -1px;
        }

        .filter-tab:hover { color: var(--text-2); }

        .filter-tab.active {
            color: var(--accent-2);
            border-bottom-color: var(--accent);
            font-weight: 500;
        }

        /* ── CONTENT ──────────────────────────────────── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* empty */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 340px;
            text-align: center;
            gap: 12px;
            color: var(--text-3);
        }

        .empty-icon { font-size: 2.6rem; opacity: 0.2; }

        .empty h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-2);
        }

        .empty p {
            font-size: 0.82rem;
            max-width: 240px;
            line-height: 1.65;
        }

        /* grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 14px;
        }

        /* card */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 9px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
            animation: cardIn 0.3s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card:nth-child(1)  { animation-delay:   0ms; }
        .card:nth-child(2)  { animation-delay:  40ms; }
        .card:nth-child(3)  { animation-delay:  80ms; }
        .card:nth-child(4)  { animation-delay: 120ms; }
        .card:nth-child(5)  { animation-delay: 160ms; }
        .card:nth-child(6)  { animation-delay: 200ms; }
        .card:nth-child(n+7){ animation-delay: 240ms; }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            opacity: 0;
            transition: opacity 0.18s;
        }

        .card:hover {
            border-color: rgba(124,110,242,.38);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,.38);
        }

        .card:hover::before { opacity: 1; }

        .card-source {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .source-avatar {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 9px;
            color: #fff;
            flex-shrink: 0;
        }

        .source-name {
            font-family: 'Syne Mono', monospace;
            font-size: 0.63rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .card-date {
            font-family: 'Syne Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-3);
            margin-left: auto;
            white-space: nowrap;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.43;
            color: var(--text);
            text-decoration: none;
            display: block;
            letter-spacing: -0.01em;
            transition: color 0.12s;
        }

        .card-title:hover { color: var(--accent-2); }

        .card-desc {
            font-size: 0.78rem;
            color: var(--text-2);
            line-height: 1.62;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 9px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .card-author {
            font-size: 0.72rem;
            color: var(--text-3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .read-link {
            font-size: 0.72rem;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            white-space: nowrap;
            transition: color 0.12s, gap 0.12s;
            margin-left: auto;
        }

        .read-link:hover { color: var(--accent-2); gap: 6px; }

        /* skeleton */
        .skel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 14px;
        }

        .skel-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skel {
            border-radius: 4px;
            background: linear-gradient(90deg,
                var(--border) 25%,
                var(--border-2) 50%,
                var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* toasts */
        .toast-stack {
            position: fixed;
            bottom: 20px; right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.8rem;
            min-width: 220px;
            max-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
            animation: toastIn 0.25s cubic-bezier(.34,1.56,.64,1);
        }

        @keyframes toastIn {
            from { transform: translateX(110%); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        .toast.ok   { border-left: 3px solid var(--ok); }
        .toast.err  { border-left: 3px solid var(--err); }
        .toast.info { border-left: 3px solid var(--accent); }

        .toast-icon { font-size: 13px; }
        .toast.ok   .toast-icon { color: var(--ok);     }
        .toast.err  .toast-icon { color: var(--err);    }
        .toast.info .toast-icon { color: var(--accent); }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

        /* mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.25s cubic-bezier(.4,0,.2,1);
            }
            .sidebar.open { transform: translateX(0); }
            .main { min-width: 100%; }
            .grid, .skel-grid { grid-template-columns: 1fr; }
            .topbar-title { display: none; }
            .live-badge { display: none; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- ═══ SIDEBAR ═══════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark"><i class="fas fa-rss"></i></div>
            <div>
                <div class="brand-text">RSS <em>Pulse</em></div>
                <div class="brand-sub">Live Feed Intelligence</div>
            </div>
        </div>

        <div class="sb-scroll">
            <div class="sb-section" style="padding-top:16px;">
                <div class="sb-label">Add Feed</div>
                <div class="add-form">
                    <div class="url-input-wrap">
                        <i class="fas fa-link"></i>
                        <input type="url" id="feedUrl" class="url-input"
                               placeholder="https://example.com/feed.xml"
                               onkeydown="if(event.key==='Enter') addFeed()">
                    </div>
                    <button class="btn-add" onclick="addFeed()">
                        <i class="fas fa-plus"></i> Subscribe
                    </button>
                </div>
            </div>

            <div class="sb-divider"></div>

            <div class="sb-section">
                <div class="sb-label">Popular Feeds</div>
                <div class="presets">
                    <button class="preset-btn" onclick="addPreset('https://hnrss.org/frontpage')">
                        <span class="preset-dot"></span> Hacker News
                    </button>
                    <button class="preset-btn" onclick="addPreset('https://feeds.feedburner.com/TechCrunch')">
                        <span class="preset-dot"></span> TechCrunch
                    </button>
                    <button class="preset-btn" onclick="addPreset('https://www.reddit.com/r/programming/.rss')">
                        <span class="preset-dot"></span> r/programming
                    </button>
                    <button class="preset-btn" onclick="addPreset('https://rss.cnn.com/rss/edition.rss')">
                        <span class="preset-dot"></span> CNN
                    </button>
                    <button class="preset-btn" onclick="addPreset('https://feeds.feedburner.com/oreilly/radar')">
                        <span class="preset-dot"></span> O'Reilly Radar
                    </button>
                </div>
            </div>

            <div id="feedsSection" style="display:none;">
                <div class="sb-divider"></div>
                <div class="sb-section">
                    <div class="sb-label">Your Feeds</div>
                    <div class="feeds-list" id="feedsList"></div>
                </div>
            </div>

            <div id="statsSection" style="display:none;">
                <div class="sb-divider"></div>
                <div class="sb-section" style="padding-bottom:0;">
                    <div class="sb-label">Stats</div>
                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-num" id="statFeeds">0</div>
                            <div class="stat-lbl">Feeds</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-num" id="statArticles">0</div>
                            <div class="stat-lbl">Articles</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- ═══ MAIN ═══════════════════════════════════════════ -->
    <div class="main">
        <header class="topbar">
            <div class="topbar-title" id="topbarTitle"><strong>All Feeds</strong></div>

            <div class="topbar-search">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput"
                       placeholder="Search articles…" oninput="filterArticles()">
            </div>

            <div class="topbar-right">
                <div class="live-badge" id="liveBadge" style="display:none;">
                    <span class="live-dot"></span>
                    <span id="lastUpdated">--:--</span>
                </div>
                <button class="btn-refresh" id="refreshBtn" onclick="refreshAll()" title="Refresh all">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <nav class="filter-bar" id="filterBar" style="display:none;"></nav>

        <div class="content" id="content">
            <div class="empty">
                <div class="empty-icon"><i class="fas fa-satellite-dish"></i></div>
                <h3>No feeds yet</h3>
                <p>Add a feed URL or pick from the popular list in the sidebar to get started.</p>
            </div>
        </div>
    </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ─── STATE ────────────────────────────────────────────────
let feeds = [];
let allArticles = [];
let activeFilter = 'all';

const AVATAR_COLORS = [
    '#7c6ef2','#e879f9','#38bdf8','#34d399',
    '#fb923c','#f43f5e','#a3e635','#facc15',
    '#60a5fa','#f472b6'
];

function feedColor(idx) { return AVATAR_COLORS[idx % AVATAR_COLORS.length]; }

// ─── ADD / FETCH ──────────────────────────────────────────
function addPreset(url) {
    document.getElementById('feedUrl').value = url;
    addFeed();
}

async function addFeed() {
    const url = document.getElementById('feedUrl').value.trim();
    if (!url) { toast('Enter a feed URL first', 'err'); return; }
    if (feeds.some(f => f.url === url)) { toast('Feed already added', 'info'); return; }
    document.getElementById('feedUrl').value = '';
    await fetchFeed(url);
}

async function fetchFeed(url) {
    if (!feeds.length) showSkeletons();
    try {
        const res = await fetch(`/api/rss?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const idx = feeds.length;
        const feed = { url, title: data.title || 'Unknown Feed', items: data.items || [], colorIndex: idx };
        feeds.push(feed);
        allArticles.push(...feed.items.map(item => ({
            ...item,
            feedTitle: feed.title,
            feedUrl: url,
            feedColorIndex: idx
        })));

        updateSidebar();
        updateFilterBar();
        renderArticles();
        toast(`Added "${feed.title}"`, 'ok');
    } catch (err) {
        renderArticles();
        toast(err.message, 'err');
    }
}

async function refreshAll() {
    if (!feeds.length) { toast('No feeds to refresh', 'info'); return; }
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    const snapshot = feeds.map(f => f.url);
    feeds = []; allArticles = [];
    for (const url of snapshot) await fetchFeed(url);
    btn.classList.remove('spinning');
}

function removeFeed(url) {
    feeds = feeds.filter(f => f.url !== url);
    allArticles = allArticles.filter(a => a.feedUrl !== url);
    if (activeFilter !== 'all' && !feeds.find(f => f.title === activeFilter)) {
        activeFilter = 'all';
    }
    updateSidebar();
    updateFilterBar();
    renderArticles();
    toast('Feed removed', 'info');
}

// ─── FILTER ───────────────────────────────────────────────
function setFilter(filter, el) {
    activeFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('topbarTitle').innerHTML =
        `<strong>${esc(filter === 'all' ? 'All Feeds' : filter)}</strong>`;
    renderArticles();
}

function setFeedFilter(title) {
    activeFilter = title;
    updateFilterBar();
    document.getElementById('topbarTitle').innerHTML = `<strong>${esc(title)}</strong>`;
    renderArticles();
}

function filterArticles() { renderArticles(); }

function getArticles() {
    let arts = activeFilter === 'all'
        ? allArticles
        : allArticles.filter(a => a.feedTitle === activeFilter);
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (q) arts = arts.filter(a =>
        (a.title || '').toLowerCase().includes(q) ||
        (a.description || '').toLowerCase().includes(q)
    );
    return arts;
}

// ─── RENDER ───────────────────────────────────────────────
function renderArticles() {
    const content = document.getElementById('content');
    const arts = getArticles();

    if (!feeds.length) {
        content.innerHTML = `<div class="empty">
            <div class="empty-icon"><i class="fas fa-satellite-dish"></i></div>
            <h3>No feeds yet</h3>
            <p>Add a feed URL or pick from the popular list in the sidebar to get started.</p>
        </div>`;
        return;
    }

    if (!arts.length) {
        content.innerHTML = `<div class="empty">
            <div class="empty-icon"><i class="fas fa-search"></i></div>
            <h3>No results</h3>
            <p>Try a different search term or switch the active filter.</p>
        </div>`;
        return;
    }

    content.innerHTML = `<div class="grid">${arts.map(cardHTML).join('')}</div>`;

    document.getElementById('liveBadge').style.display = 'flex';
    document.getElementById('lastUpdated').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function cardHTML(item) {
    const color = feedColor(item.feedColorIndex ?? 0);
    const initial = (item.feedTitle || '?').charAt(0).toUpperCase();
    const date = item.pubDate ? timeAgo(new Date(item.pubDate)) : '';
    const desc = item.description
        ? item.description.replace(/<[^>]*>/g, '').trim().slice(0, 220)
        : '';

    return `<div class="card" onclick="if(event.target.tagName!=='A') window.open('${esc(item.link)}','_blank')">
        <div class="card-source">
            <div class="source-avatar" style="background:${color}">${initial}</div>
            <span class="source-name">${esc(item.feedTitle)}</span>
            ${date ? `<span class="card-date">${date}</span>` : ''}
        </div>
        <a href="${esc(item.link)}" target="_blank" class="card-title"
           onclick="event.stopPropagation()">${esc(item.title || 'Untitled')}</a>
        ${desc ? `<div class="card-desc">${esc(desc)}</div>` : ''}
        <div class="card-footer">
            ${item.author
                ? `<span class="card-author">
                       <i class="fas fa-user" style="font-size:9px;margin-right:4px;opacity:.45;"></i>${esc(item.author)}
                   </span>`
                : ''}
            <a href="${esc(item.link)}" target="_blank" class="read-link"
               onclick="event.stopPropagation()">
                Read <i class="fas fa-arrow-right" style="font-size:9px;"></i>
            </a>
        </div>
    </div>`;
}

function updateSidebar() {
    document.getElementById('feedsSection').style.display = feeds.length ? '' : 'none';
    document.getElementById('statsSection').style.display = feeds.length ? '' : 'none';
    document.getElementById('statFeeds').textContent = feeds.length;
    document.getElementById('statArticles').textContent = allArticles.length;

    document.getElementById('feedsList').innerHTML = feeds.map((f, i) => `
        <div class="feed-row ${activeFilter === f.title ? 'active' : ''}"
             onclick="setFeedFilter(${JSON.stringify(f.title)})">
            <div class="feed-avatar" style="background:${feedColor(i)}">${f.title.charAt(0).toUpperCase()}</div>
            <div class="feed-row-info">
                <div class="feed-row-name">${esc(f.title)}</div>
                <div class="feed-row-meta">${f.items.length} articles</div>
            </div>
            <button class="feed-remove"
                    onclick="event.stopPropagation(); removeFeed(${JSON.stringify(f.url)})"
                    title="Remove">
                <i class="fas fa-times"></i>
            </button>
        </div>`).join('');
}

function updateFilterBar() {
    const bar = document.getElementById('filterBar');
    if (!feeds.length) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.innerHTML = `
        <button class="filter-tab ${activeFilter === 'all' ? 'active' : ''}"
                onclick="setFilter('all',this)">All</button>
        ${feeds.map(f =>
            `<button class="filter-tab ${activeFilter === f.title ? 'active' : ''}"
                     onclick="setFilter(${JSON.stringify(f.title)},this)">${esc(f.title)}</button>`
        ).join('')}`;
}

function showSkeletons() {
    document.getElementById('content').innerHTML = `
        <div class="skel-grid">
            ${Array(6).fill(0).map(() => `
                <div class="skel-card">
                    <div class="skel" style="height:12px;width:36%;"></div>
                    <div class="skel" style="height:16px;width:88%;margin-top:4px;"></div>
                    <div class="skel" style="height:16px;width:70%;"></div>
                    <div class="skel" style="height:11px;width:100%;margin-top:6px;"></div>
                    <div class="skel" style="height:11px;width:88%;"></div>
                    <div class="skel" style="height:11px;width:62%;"></div>
                </div>`).join('')}
        </div>`;
}

// ─── UTILS ────────────────────────────────────────────────
function toast(msg, type = 'info') {
    const icons = { ok: 'check-circle', err: 'exclamation-circle', info: 'info-circle' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<i class="fas fa-${icons[type]} toast-icon"></i><span>${esc(msg)}</span>`;
    document.getElementById('toastStack').prepend(el);
    setTimeout(() => el.remove(), 4000);
}

function esc(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function timeAgo(d) {
    if (isNaN(d)) return '';
    const diff = Date.now() - d;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
}

// ─── AUTO REFRESH ─────────────────────────────────────────
setInterval(() => { if (feeds.length) refreshAll(); }, 300000);

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
    setTimeout(() => addPreset('https://hnrss.org/frontpage'), 500);
});
</script>
</body>
</html>
